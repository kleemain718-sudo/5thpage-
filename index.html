<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>for my sayang ♡</title><style>
body{margin:0;background:#090909;color:#fff;font-family:Arial,sans-serif;overflow:hidden}
#bg span{position:absolute;color:#ff7ab6;animation:fall linear infinite}
.container{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;text-align:center}
button{padding:12px 24px;border:none;border-radius:30px;background:#ff5fa2;color:#fff;font-size:18px;cursor:pointer}
#content{display:none;max-width:700px}
h1{color:#ff8fc0}
.small{opacity:.8}
</style></head><body>
<div id="bg"></div>
<div class="container">
<div id="intro">
<h1>hey, sayang. ♡</h1>
<p>i made this little place just for you.</p>
<p>happy 5th monthsary.</p>
<button onclick="openCard()">open ♡</button>
</div>
<div id="content">
<h1>happy 5th monthsary, my love ❤️</h1>
<p id="typing"></p>
<h2 id="counter"></h2>
<p>thank you for staying, loving me, and becoming my safest place.</p>
<p>if i had to choose again,<br>i'd still choose you.<br>over and over.<br>in every lifetime.</p>
<p><b>i love you, always.</b></p>
<p class="small">— yours, forever ♡</p>
</div></div>
<script>
for(let i=0;i<40;i++){let s=document.createElement('span');s.textContent='❤';s.style.left=Math.random()*100+'vw';s.style.top='-5vh';s.style.fontSize=(10+Math.random()*20)+'px';s.style.animationDuration=(5+Math.random()*6)+'s';document.getElementById('bg').appendChild(s);s.animate([{transform:'translateY(-10vh)'},{transform:'translateY(120vh)'}],{duration:(5000+Math.random()*6000),iterations:Infinity});}
function openCard(){intro.style.display='none';content.style.display='block';type();}
const msg="since february 14, you've become my favorite part of every single day. thank you for every smile, every laugh, every little moment. you're my comfort, my home, and my favorite person. i love you more than words can ever explain. ♡";
let i=0;function type(){if(i<msg.length){typing.textContent+=msg[i++];setTimeout(type,35);}}
function tick(){let start=new Date('2026-02-14T00:00:00');let now=new Date();let d=Math.max(0,now-start);let days=Math.floor(d/86400000),hrs=Math.floor(d%86400000/3600000),min=Math.floor(d%3600000/60000),sec=Math.floor(d%60000/1000);counter.textContent=`loving you for ${days} days ${hrs}h ${min}m ${sec}s`;}
setInterval(tick,1000);tick();
</script></body></html>
